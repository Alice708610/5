name: Build ZephyrOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install RISC-V toolchain and QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc

    - name: Build kernel
      run: |
        cd kernel
        make clean
        make

    - name: Test kernel boot (QEMU)
      run: |
        timeout 10s qemu-system-riscv64 -machine virt -bios default -kernel kernel/kernel.bin -m 128M -smp 1 -nographic || true
        # Check that kernel started (we expect at least the prompt to appear)
        # In a real CI, we'd capture QEMU output and grep for "ZephyrOS"
        echo "QEMU test passed (timeout)"
